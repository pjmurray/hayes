<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- HAYES monogram — ink square, bone serif H. -->
  <rect width="64" height="64" fill="#141414"/>
  <!-- Left vertical stroke -->
  <rect x="15" y="14" width="5" height="36" fill="#F4F0E8"/>
  <!-- Right vertical stroke -->
  <rect x="44" y="14" width="5" height="36" fill="#F4F0E8"/>
  <!-- Horizontal bar -->
  <rect x="20" y="30" width="24" height="4" fill="#F4F0E8"/>
  <!-- Top-left serif -->
  <rect x="12" y="14" width="11" height="2" fill="#F4F0E8"/>
  <!-- Top-right serif -->
  <rect x="41" y="14" width="11" height="2" fill="#F4F0E8"/>
  <!-- Bottom-left serif -->
  <rect x="12" y="48" width="11" height="2" fill="#F4F0E8"/>
  <!-- Bottom-right serif -->
  <rect x="41" y="48" width="11" height="2" fill="#F4F0E8"/>
</svg>
